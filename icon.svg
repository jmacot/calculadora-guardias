<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circle -->
  <circle cx="420" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <!-- Calculator body -->
  <rect x="136" y="88" width="240" height="336" rx="28" fill="white" opacity="0.95"/>
  <!-- Screen -->
  <rect x="164" y="116" width="184" height="72" rx="14" fill="#1a3a5c" opacity="0.12"/>
  <!-- Euro symbol on screen -->
  <text x="256" y="166" font-family="Inter, sans-serif" font-size="42" font-weight="700" fill="#1a3a5c" text-anchor="middle" opacity="0.7">€</text>
  <!-- Button grid — row 1 -->
  <rect x="164" y="212" width="40" height="40" rx="10" fill="#8b5cf6" opacity="0.85"/>
  <rect x="220" y="212" width="40" height="40" rx="10" fill="#8b5cf6" opacity="0.85"/>
  <rect x="276" y="212" width="40" height="40" rx="10" fill="#8b5cf6" opacity="0.85"/>
  <rect x="332" y="212" width="16" height="40" rx="8" fill="#4caf7d" opacity="0.7"/>
  <!-- Button grid — row 2 -->
  <rect x="164" y="268" width="40" height="40" rx="10" fill="#1a3a5c" opacity="0.15"/>
  <rect x="220" y="268" width="40" height="40" rx="10" fill="#1a3a5c" opacity="0.15"/>
  <rect x="276" y="268" width="40" height="40" rx="10" fill="#1a3a5c" opacity="0.15"/>
  <rect x="332" y="268" width="16" height="40" rx="8" fill="#4caf7d" opacity="0.7"/>
  <!-- Button grid — row 3 -->
  <rect x="164" y="324" width="40" height="40" rx="10" fill="#1a3a5c" opacity="0.15"/>
  <rect x="220" y="324" width="40" height="40" rx="10" fill="#1a3a5c" opacity="0.15"/>
  <rect x="276" y="324" width="40" height="40" rx="10" fill="#1a3a5c" opacity="0.15"/>
  <rect x="332" y="324" width="16" height="40" rx="8" fill="#4caf7d" opacity="0.7"/>
  <!-- Bottom button (equals) -->
  <rect x="164" y="380" width="96" height="32" rx="8" fill="#1a3a5c" opacity="0.15"/>
  <rect x="276" y="380" width="40" height="32" rx="8" fill="#1a3a5c" opacity="0.15"/>
  <rect x="332" y="380" width="16" height="32" rx="8" fill="#4caf7d"/>
  <!-- Plus signs on purple buttons -->
  <line x1="176" y1="232" x2="192" y2="232" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="184" y1="224" x2="184" y2="240" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="232" y1="232" x2="248" y2="232" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="288" y1="226" x2="304" y2="238" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="304" y1="226" x2="288" y2="238" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
