<style>
  :root {
    --bg: #e8edf4;
    --surface: rgba(255, 255, 255, 0.55);
    --surface-solid: #ffffff;
    --surface2: rgba(255, 255, 255, 0.35);
    --border: rgba(255, 255, 255, 0.5);
    --border-light: rgba(255, 255, 255, 0.6);
    --accent: #0284c7; --accent-light: rgba(224, 242, 254, 0.6); --accent-hover: #0369a1;
    --accent-green: #10b981; --accent-blue: #0284c7;
    --text: #1a1a2e; --text-muted: #555666; --text-light: #8890a4;
    --sky: #0284c7; --sky-light: rgba(224, 242, 254, 0.6);
    --violet: #7c3aed; --violet-light: rgba(237, 233, 254, 0.6);
    --emerald: #10b981; --emerald-light: rgba(209, 250, 229, 0.6);
    --green: #10b981; --green-light: rgba(209, 250, 229, 0.6);
    --amber: #f59e0b; --amber-light: rgba(254, 243, 199, 0.6);
    --red: #ef4444; --red-light: rgba(254, 226, 226, 0.6);
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.04);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
    --shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.08);
    --radius-sm: 10px; --radius: 16px; --radius-lg: 24px;
    --glass-blur: 16px;
    --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  /* Dark mode */
  [data-theme="dark"] {
    --bg: #111827;
    --surface: rgba(31, 41, 55, 0.6);
    --surface-solid: #1f2937;
    --surface2: rgba(40, 50, 68, 0.5);
    --border: rgba(255, 255, 255, 0.08);
    --border-light: rgba(255, 255, 255, 0.1);
    --text: #f1f5f9; --text-muted: #a8b8cc; --text-light: #64748b;
    --accent: #38bdf8; --accent-hover: #7dd3fc; --accent-light: rgba(2, 132, 199, 0.15);
    --accent-green: #6ee7b7; --accent-blue: #38bdf8;
    --sky: #38bdf8; --sky-light: rgba(2, 132, 199, 0.15);
    --violet: #a78bfa; --violet-light: rgba(124, 58, 237, 0.15);
    --emerald: #6ee7b7; --emerald-light: rgba(16, 185, 129, 0.15);
    --green: #6ee7b7; --green-light: rgba(16, 185, 129, 0.15);
    --amber: #fbbf24; --amber-light: rgba(245, 158, 11, 0.15);
    --red: #f87171; --red-light: rgba(239, 68, 68, 0.15);
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.15);

  }
  [data-theme="dark"] .result-box.bruto { background: var(--sky-light); border-color: rgba(2,132,199,0.25); }
  [data-theme="dark"] .result-box.bruto .value { color: var(--sky); }
  [data-theme="dark"] .result-box.neto { background: var(--emerald-light); border-color: rgba(16,185,129,0.25); }
  [data-theme="dark"] .result-box.neto .value { color: var(--emerald); }
  [data-theme="dark"] .result-box.irpf-box { background: var(--amber-light); border-color: rgba(245,158,11,0.25); }
  [data-theme="dark"] .result-box.irpf-box .value { color: var(--amber); }

  [data-theme="dark"] .cal-day.sel-24 { background: var(--emerald-light); border-color: rgba(16,185,129,0.3); }

  [data-theme="dark"] .tag.green { background: var(--emerald-light); color: var(--emerald); border-color: rgba(16,185,129,0.2); }
  [data-theme="dark"] .tag.amber { background: var(--amber-light); color: var(--amber); border-color: rgba(245,158,11,0.2); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
    .skip-link {
      position: absolute; top: -100px; left: 16px;
      background: var(--ink, var(--text, #0f172a)); color: var(--bg, #fff);
      padding: 10px 20px; border-radius: 8px;

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    padding: 2.5rem 1rem 5rem;
    -webkit-tap-highlight-color: transparent;
  }

    /* ── MESH GRADIENT ANIMADO ── */
    .mesh-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; background: var(--bg); }
    .mesh-orb { position: absolute; border-radius: 50%; filter: blur(80px); will-change: transform; }
    .mesh-orb-1 { width: 50vw; height: 50vw; top: 10%; left: -10%; background: rgba(2,132,199,0.22); animation: orb1 18s ease-in-out infinite; }
    .mesh-orb-2 { width: 45vw; height: 45vw; top: 40%; right: -15%; background: rgba(124,58,237,0.18); animation: orb2 22s ease-in-out infinite; }
    .mesh-orb-3 { width: 40vw; height: 40vw; bottom: -5%; left: 30%; background: rgba(16,185,129,0.15); animation: orb3 20s ease-in-out infinite; }
    .mesh-orb-4 { width: 35vw; height: 35vw; top: 60%; left: 10%; background: rgba(245,158,11,0.10); animation: orb4 24s ease-in-out infinite; }
    .mesh-orb-5 { width: 30vw; height: 30vw; top: 5%; right: 20%; background: rgba(239,68,68,0.08); animation: orb5 19s ease-in-out infinite; }
    @keyframes orb1 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(15vw,10vh) scale(1.1); } 66% { transform: translate(-5vw,20vh) scale(0.95); } }
    @keyframes orb2 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-20vw,-10vh) scale(1.05); } 66% { transform: translate(5vw,15vh) scale(1.1); } }
    @keyframes orb3 { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(10vw,-15vh) scale(1.08); } 66% { transform: translate(-15vw,-5vh) scale(0.92); } }
    @keyframes orb4 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20vw,-10vh) scale(1.15); } }
    @keyframes orb5 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-15vw,15vh) scale(1.1); } }
    .mesh-dots { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: radial-gradient(circle, var(--text-light, #8890a4) 0.5px, transparent 0.5px); background-size: 28px 28px; opacity: 0.05; }
    [data-theme="dark"] .mesh-orb-1 { background: rgba(2,132,199,0.10); }
    [data-theme="dark"] .mesh-orb-2 { background: rgba(124,58,237,0.08); }
    [data-theme="dark"] .mesh-orb-3 { background: rgba(16,185,129,0.06); }
    [data-theme="dark"] .mesh-orb-4 { background: rgba(245,158,11,0.05); }
    [data-theme="dark"] .mesh-orb-5 { background: rgba(239,68,68,0.04); }
    [data-theme="dark"] .mesh-dots { opacity: 0.03; }

    .app-header, .card, .app-footer, .back-home { position: relative; z-index: 1; }

    /* ── DOT GRID + GLOWS ── */
    .hero-dot-grid { display: none; }
    .hero-glow { position: absolute; border-radius: 50%; filter: blur(50px); z-index: 0; animation: glowPulse 6s ease-in-out infinite; }
    .hero-glow-1 { top: -30px; right: 15%; width: 180px; height: 180px; background: radial-gradient(circle, rgba(56,189,248,0.35) 0%, transparent 70%); }
    .hero-glow-2 { bottom: -20px; left: 20%; width: 150px; height: 150px; background: radial-gradient(circle, rgba(167,139,250,0.25) 0%, transparent 70%); animation-delay: 3s; }
    @keyframes glowPulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }

    /* ── SKY TOGGLE ── */
    .sky-toggle { --toggle-size: 20px; position: absolute; top: 12px; right: 12px; z-index: 10; font-size: var(--toggle-size); }
    .sky-toggle *, .sky-toggle *::before, .sky-toggle *::after { box-sizing: border-box; margin: 0; padding: 0; font-size: var(--toggle-size); }
    .sky-toggle input { display: none; }
    .sky-toggle__container { width: 5.625em; height: 2.5em; background-color: #3D7EAE; border-radius: 6.25em; overflow: hidden; cursor: pointer; box-shadow: 0em -0.062em 0.062em rgba(0,0,0,0.25), 0em 0.062em 0.125em rgba(255,255,255,0.94); transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); position: relative; }
    .sky-toggle__container::before { content: ""; position: absolute; z-index: 1; inset: 0; box-shadow: 0em 0.05em 0.187em rgba(0,0,0,0.25) inset; border-radius: 6.25em; }
    .sky-toggle__circle { width: 3.375em; height: 3.375em; background-color: rgba(255,255,255,0.1); position: absolute; left: calc((3.375em - 2.5em) / 2 * -1); top: calc((3.375em - 2.5em) / 2 * -1); border-radius: 6.25em; box-shadow: inset 0 0 0 3.375em rgba(255,255,255,0.1), 0 0 0 0.625em rgba(255,255,255,0.1), 0 0 0 1.25em rgba(255,255,255,0.1); display: flex; transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17); pointer-events: none; }
    .sky-toggle__sun-moon { pointer-events: auto; position: relative; z-index: 2; width: 2.125em; height: 2.125em; margin: auto; border-radius: 6.25em; background-color: #ECCA2F; box-shadow: 0.062em 0.062em 0.062em 0em rgba(254,255,239,0.61) inset, 0em -0.062em 0.062em 0em #a1872a inset; filter: drop-shadow(0.062em 0.125em 0.125em rgba(0,0,0,0.25)); overflow: hidden; transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); }
    .sky-toggle__moon { transform: translateX(100%); width: 100%; height: 100%; background-color: #C4C9D1; border-radius: inherit; box-shadow: 0.062em 0.062em 0.062em 0em rgba(254,255,239,0.61) inset, 0em -0.062em 0.062em 0em #969696 inset; transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); position: relative; }
    .sky-toggle__spot { position: absolute; top: 0.75em; left: 0.312em; width: 0.75em; height: 0.75em; border-radius: 6.25em; background-color: #959DB1; box-shadow: 0em 0.0312em 0.062em rgba(0,0,0,0.25) inset; }
    .sky-toggle__spot:nth-of-type(2) { width: 0.375em; height: 0.375em; top: 0.937em; left: 1.375em; }
    .sky-toggle__spot:nth-of-type(3) { width: 0.25em; height: 0.25em; top: 0.312em; left: 0.812em; }
    .sky-toggle__clouds { width: 1.25em; height: 1.25em; background-color: #F3FDFF; border-radius: 6.25em; position: absolute; bottom: -0.625em; left: 0.312em; box-shadow: 0.937em 0.312em #F3FDFF, -0.312em -0.312em #AACADF, 1.437em 0.375em #F3FDFF, 0.5em -0.125em #AACADF, 2.187em 0 #F3FDFF, 1.25em -0.062em #AACADF, 2.937em 0.312em #F3FDFF, 2em -0.312em #AACADF, 3.625em -0.062em #F3FDFF, 2.625em 0em #AACADF, 4.5em -0.312em #F3FDFF, 3.375em -0.437em #AACADF, 4.625em -1.75em 0 0.437em #F3FDFF, 4em -0.625em #AACADF, 4.125em -2.125em 0 0.437em #AACADF; transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); }
    .sky-toggle__stars { position: absolute; color: #fff; top: -100%; left: 0.312em; width: 2.75em; height: auto; transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25); }
    .sky-toggle input:checked + .sky-toggle__container { background-color: #1D1F2C; }
    .sky-toggle input:checked + .sky-toggle__container .sky-toggle__circle { left: calc(100% - (3.375em - 2.5em) / 2 * -1 - 3.375em); }
    .sky-toggle input:checked + .sky-toggle__container .sky-toggle__moon { transform: translate(0); }
    .sky-toggle input:checked + .sky-toggle__container .sky-toggle__clouds { bottom: -4.062em; }
    .sky-toggle input:checked + .sky-toggle__container .sky-toggle__stars { top: 50%; transform: translateY(-50%); }
    .sky-toggle__container:hover .sky-toggle__circle { left: calc((3.375em - 2.5em) / 2 * -1 + 0.187em); }
    .sky-toggle input:checked + .sky-toggle__container:hover .sky-toggle__circle { left: calc(100% - (3.375em - 2.5em) / 2 * -1 - 3.375em - 0.187em); }

  .app-header {
    text-align: center; margin-bottom: 28px; position: relative;
    background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    color: white; padding: 44px 32px 36px;
    border-radius: 0 0 var(--radius) var(--radius); overflow: hidden;
    box-shadow: 0 8px 32px rgba(30,41,59,0.25);
    animation: fadeInUp 0.6s ease-out;
  }
  /* Accent line bottom */
  .app-header::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--sky, #38bdf8), var(--violet, #a78bfa), transparent);
    opacity: 0.7; z-index: 2;
  }
  .app-header h1 {
    font-family: 'Source Serif 4', serif;
    font-size: clamp(1.4rem, 3.5vw, 1.8rem);
    font-weight: 600;
    color: white; position: relative; z-index: 1;
  }
  .app-header p { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 4px; position: relative; z-index: 1; }
  [data-theme="dark"] .app-header {
    background: linear-gradient(135deg, #111827 0%, #1e293b 50%, #2d3748 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes focusPulse {
    0% { box-shadow: 0 0 0 0 rgba(2,132,199,0.25); }
    70% { box-shadow: 0 0 0 6px rgba(2,132,199,0); }
    100% { box-shadow: 0 0 0 0 rgba(2,132,199,0); }
  }
  @keyframes focusPulseDark {
    0% { box-shadow: 0 0 0 0 rgba(56,189,248,0.3); }
    70% { box-shadow: 0 0 0 6px rgba(56,189,248,0); }
    100% { box-shadow: 0 0 0 0 rgba(56,189,248,0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.6); }
    60% { transform: scale(1.08); }
    to { opacity: 1; transform: scale(1); }
  }

  .back-home {
    position: fixed;
    top: 10px;
    left: 10px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Source Code Pro', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    transition: var(--transition);
    z-index: 100;
  }
  .back-home:hover { border-color: var(--accent); color: var(--accent); }
  @media (max-width: 600px) {
    .back-home { padding: 4px 8px; font-size: 10px; top: 6px; left: 6px; }
    .app-header { padding: 52px 20px 28px; border-radius: 0 0 12px 12px; }
    .app-header::after { /* keep accent line */ }
    .sky-toggle { --toggle-size: 13px; top: 8px; right: 8px; }
    .hero-glow { display: none; }
  }

  /* Dark mode toggle */

  /* Config pills */
  .config-pills {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 1.2rem;
    flex-wrap: wrap;
    position: relative;
  }
  .config-pill {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .config-pill:hover { border-color: rgba(255,255,255,0.5); color: white; }
  .config-pill.active { border-color: rgba(255,255,255,0.6); color: #fff; background: rgba(255,255,255,0.18); }

  /* Reset link under calendar */
  .cal-reset-link {
    display: block;
    text-align: center;
    margin-top: 0.6rem;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    padding: 6px 18px;
    font-family: 'Source Sans 3', sans-serif;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .cal-reset-link:hover { color: var(--red); border-color: rgba(239,68,68,0.3); background: var(--red-light); }
  [data-theme="dark"] .cal-reset-link:hover { background: var(--red-light); }

  /* Animated value transition */
  .value-animate {
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
  }
  .value-animate.bumping {
    transform: scale(1.08);
  }
  .container { max-width: 900px; margin: 0 auto; display: grid; gap: 1.4rem; }
  @media (min-width: 1024px) {
    body { padding: 1rem 2rem 2rem; }
    .app-header { margin-bottom: 16px; }
    .container { max-width: 1380px; grid-template-columns: 1fr 1fr; gap: 1rem; }
    #modules-container { display: contents; }
    #modules-container .card {
      min-width: 0;
      padding: 1.2rem 1.4rem;
      display: grid;
      grid-template-rows: subgrid;
      grid-row: span 4;
    }
    #modules-container .card .rates-box { margin-bottom: 0.6rem; padding: 0.5rem 0.8rem; }
    #modules-container .card .results-grid { margin-top: 0.6rem; gap: 0.5rem; }
    #modules-container .card .result-box { padding: 0.6rem 0.8rem; }
    #modules-container .card .result-box .value { font-size: 1.2rem; }
    #modules-container .card .result-box .label { margin-bottom: 0.2rem; }
    #modules-container .card .cal-header { margin-bottom: 0.4rem; }
    #modules-container .card .cal-day { padding-top: 78%; }
    #modules-container .card .cal-legend { margin-top: 0.4rem; }
    #modules-container .card .cal-reset-link { margin-top: 0.4rem; padding: 4px 14px; }
    #modules-container .card .input-group input { padding: 0.5rem 0.7rem; font-size: 1rem; }
    #modules-container .card .irpf-row input { padding: 0.4rem 0.5rem; }
    .final-card { grid-row: span 4; }
    .final-card.full-width { grid-column: 1 / -1; grid-row: auto; }
  }

  /* CARD — Glass */
  .card {

    ]

const LOGOS = {
  hsjd: { dia: 'imagenes/hsjd-dia.jpg', noche: 'imagenes/hsjd-noche.png' },
  vithas: { dia: 'imagenes/vithas-dia.jpg', noche: 'imagenes/vithas-noche.png' },
  sas: { dia: 'imagenes/sas-dia.png', noche: 'imagenes/sas-noche.png' }
};

let currentConfig = 'hsjd_vithas';
let calState = {};

// ═══ FESTIVOS NACIONALES FIJOS ═══
const FESTIVOS_FIJOS = [
  [1,1],[1,6],[5,1],[8,15],[10,12],[11,1],[12,6],[12,8],[12,25]
];

function pascua(y) {
  const a=y%19, b=Math.floor(y/100), c=y%100;
  const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4), k=c%4;
  const l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const mes=Math.floor((h+l-7*m+114)/31);
  const dia=((h+l-7*m+114)%31)+1;
  return {mes, dia};
}

function viernesSanto(y) {
  const p = pascua(y);
  const d = new Date(y, p.mes-1, p.dia);
  d.setDate(d.getDate()-2);
  return `${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function festivosNacionales(y) {
  const set = new Set();
  FESTIVOS_FIJOS.forEach(([m,d]) => {
    set.add(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  });
  set.add(viernesSanto(y));
  return set;
}

// ═══ FESTIVOS AUTONOMICOS ═══
const FESTIVOS_CCAA = {
  'andalucia':       { fijos: [[2,28]], pascua: ['jueves_santo'] },
  'aragon':          { fijos: [[4,23]], pascua: ['jueves_santo'] },
  'asturias':        { fijos: [[9,8]],  pascua: ['jueves_santo'] },
  'baleares':        { fijos: [[3,1]],  pascua: ['jueves_santo'] },
  'canarias':        { fijos: [[5,30]], pascua: ['jueves_santo'] },
  'cantabria':       { fijos: [[7,28]], pascua: ['jueves_santo'] },
  'castilla-la-mancha': { fijos: [[5,31]], pascua: ['jueves_santo','corpus'] },
  'castilla-y-leon': { fijos: [[4,23]], pascua: ['jueves_santo'] },
  'cataluna':        { fijos: [[6,24],[9,11]], pascua: ['lunes_pascua'] },
  'extremadura':     { fijos: [[9,8]],  pascua: ['jueves_santo'] },
  'galicia':         { fijos: [[7,25]], pascua: ['jueves_santo'] },
  'madrid':          { fijos: [[5,2]],  pascua: ['jueves_santo'] },
  'murcia':          { fijos: [[6,9]],  pascua: ['jueves_santo'] },
  'navarra':         { fijos: [[12,3]], pascua: ['jueves_santo'] },
  'pais-vasco':      { fijos: [[10,25]], pascua: ['jueves_santo'] },
  'la-rioja':        { fijos: [[6,9]],  pascua: ['jueves_santo','lunes_pascua'] },
  'comunidad-valenciana': { fijos: [[10,9]], pascua: ['lunes_pascua'] },
  'ceuta':           { fijos: [[9,2]],  pascua: ['jueves_santo'] },
  'melilla':         { fijos: [[9,17]], pascua: ['jueves_santo'] },
};

function festivosCCAA(y, ccaa) {
  const set = new Set();
  const cfg = FESTIVOS_CCAA[ccaa];
  if (!cfg) return set;
  cfg.fijos.forEach(([m,d]) => {
    set.add(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  });
  const p = pascua(y);
  const pd = new Date(y, p.mes-1, p.dia);
  (cfg.pascua || []).forEach(tipo => {
    const d = new Date(pd);
    if (tipo === 'jueves_santo') d.setDate(d.getDate()-3);
    else if (tipo === 'lunes_pascua') d.setDate(d.getDate()+1);
    else if (tipo === 'corpus') d.setDate(d.getDate()+60);
    set.add(`${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  });
  return set;
}

const festivosCache = {};
function getFestivos(y) {
  if (!festivosCache[y]) {
    const nac = festivosNacionales(y);
    festivosCCAA(y, 'andalucia').forEach(f => nac.add(f));
    festivosCache[y] = nac;
  }
  return festivosCache[y];
}

function esFestivo(y, m, d) {
  const s = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return getFestivos(y).has(s);
}

function es24h(y, m, d) {
  const dow = new Date(y, m, d).getDay();
  return dow === 0 || dow === 6 || esFestivo(y, m, d);
}

// ─────────────────────────────────────────────
//  CALENDARIO
// ─────────────────────────────────────────────
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_DOW = ['L','M','X','J','V','S','D'];

function renderCal(id) {
  const state = calState[id];
  if (!state) return;
  const {year, month, selected} = state;
  const mod = CONFIGS[currentConfig].modules.find(m => m.id === id);
  const sl = mod && mod.slotLabels;
  const label = document.getElementById(`${id}-month-label`);
  const grid  = document.getElementById(`${id}-cal`);
  if (!label || !grid) return;

  label.textContent = `${MESES[month]} ${year}`;
  grid.innerHTML = '';

  DIAS_DOW.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i >= 5 ? ' weekend' : '');
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    el.innerHTML = '<div class="cal-day-inner"></div>';
    grid.appendChild(el);
  }

  const daysInMonth = new Date(year, month+1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const key = `${year}-${month}-${d}`;
    const tipo = es24h(year, month, d) ? '24' : '17';
    const festivo = esFestivo(year, month, d);
    const dow = (new Date(year, month, d).getDay() + 6) % 7;

    let cls = 'cal-day';
    if (festivo) cls += ' festivo';
    else if (dow >= 5) cls += ' weekend';
    if (selected[key]) cls += ` sel-${tipo}`;
    el.className = cls;

    const inner = document.createElement('div');
    inner.className = 'cal-day-inner';
    inner.textContent = d;
    if (sl) inner.setAttribute('data-sel-label', tipo === '17' ? sl.s17 : sl.s24);
    el.appendChild(inner);

    el.addEventListener('click', () => {
      if (selected[key]) { delete selected[key]; }
      else { selected[key] = tipo; }
      syncInputs(id);
      renderCal(id);
      calcular();
    });

    grid.appendChild(el);
  }
}

function renderAllCals() {
  const cfg = CONFIGS[currentConfig];
  cfg.modules.forEach(m => renderCal(m.id));
}

function syncInputs(id) {
  const state = calState[id];
  if (!state) return;
  let c17 = 0, c24 = 0;
  Object.values(state.selected).forEach(t => { if(t==='17') c17++; else c24++; });
  const el17 = document.getElementById(`${id}-count17`);
  const el24 = document.getElementById(`${id}-count24`);
  if (el17) el17.value = c17;
  if (el24) el24.value = c24;
}

// ═══ NAVEGACION CALENDARIOS (con sync) ═══
function navCal(sourceId, dir) {
  let newMonth = calState[sourceId].month + dir;
  let newYear = calState[sourceId].year;
  if (newMonth < 0) { newMonth = 11; newYear--; }
  if (newMonth > 11) { newMonth = 0; newYear++; }
  const cfg = CONFIGS[currentConfig];
  cfg.modules.forEach(m => {
    if (calState[m.id]) {
      calState[m.id].month = newMonth;
      calState[m.id].year = newYear;
      renderCal(m.id);
    }
  });
}

function getModuleHTML(mod) {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  let ratesHTML = '';

    const v17 = mod.rates.r17 || '';
    const v24 = mod.rates.r24 || '';

      <div class="rates-box">
        <span class="rates-box-label">Tarifas</span>
        <div class="rate-item">
          <span>17h</span>
          <input type="number" id="${mod.id}-rate17" value="${v17}" step="0.01" min="0" placeholder="0">

        </div>
      </div>`;

    const m17 = mod.rates.m17 || '';
    const e17 = mod.rates.e17 || '';
    const m24 = mod.rates.m24 || '';
    const e24 = mod.rates.e24 || '';
    ratesHTML = `
      <div class="rates-box">
        <span class="rates-box-label">Tarifas</span>
        <div class="rate-item">
          <span>17h</span>
          <input type="number" id="${mod.id}-mult17" value="${m17}" step="0.5" min="0" placeholder="h" style="width:50px">
          <span class="rate-unit">h x</span>
          <input type="number" id="${mod.id}-eur17" value="${e17}" step="0.01" min="0" placeholder="0">
          <span class="rate-unit">€/h</span>
        </div>
        <div class="rate-item">
          <span>24h</span>
          <input type="number" id="${mod.id}-mult24" value="${m24}" step="0.5" min="0" placeholder="h" style="width:50px">

          <input type="number" id="${mod.id}-eur24" value="${e24}" step="0.01" min="0" placeholder="0">

        </div>
      </div>`;
  } else if (mod.type === 'plana') {
    const v17 = mod.rates.r17 || '';
    const v24 = mod.rates.r24 || '';
    const lb17 = mod.slotLabels ? mod.slotLabels.s17 : '17h';
    const lb24 = mod.slotLabels ? mod.slotLabels.s24 : '24h';

        </div>
        <div class="rate-item">
          <span>${lb24}</span>
          <input type="number" id="${mod.id}-rate24" value="${v24}" step="1" min="0" placeholder="0">
          <span class="rate-unit">€</span>
        </div>
      </div>`;
  }

  const slotAttr = mod.slotLabels ? ` data-slot17="${mod.slotLabels.s17}" data-slot24="${mod.slotLabels.s24}"` : '';
  return `
    <div class="card" data-module="${mod.id}"${slotAttr}>
      <div class="card-title">
        ${logoHTML}
        ${mod.name}
        <span class="${tagClass}">${mod.tag}</span>
      </div>
      ${ratesHTML}
      <div class="card-body">
        <div class="cal-wrap">
          <div class="cal-header">
            <button id="${mod.id}-prev">&#8249;</button>
            <div class="cal-month" id="${mod.id}-month-label"></div>
            <button id="${mod.id}-next">&#8250;</button>
          </div>
          <div class="cal-grid" id="${mod.id}-cal"></div>
          <button class="cal-reset-link" data-cal="${mod.id}">limpiar</button>
        </div>
        <div class="inputs-side">
          <div class="input-group">
            <label>${mod.labels.c17}</label>
            <input type="number" id="${mod.id}-count17" min="0" value="0" placeholder="0">
          </div>
          <div class="input-group">
            <label>${mod.labels.c24}</label>
            <input type="number" id="${mod.id}-count24" min="0" value="0" placeholder="0">
          </div>
          <div class="irpf-row">
            <label>IRPF (%)</label>
            <input type="number" id="${mod.id}-irpf" min="0" max="50" step="0.5" value="15">
            <span class="irpf-hint">Retencion fiscal</span>
          </div>
        </div>
      </div>
      <div class="results-grid">
        <div class="result-box"><div class="label">Base bruta ${mod.slotLabels ? mod.slotLabels.s17 : '17h'}</div><div class="value" id="${mod.id}-res17">0,00 €</div></div>
        <div class="result-box"><div class="label">Base bruta ${mod.slotLabels ? mod.slotLabels.s24 : '24h'}</div><div class="value" id="${mod.id}-res24">0,00 €</div></div>
        <div class="result-box bruto"><div class="label">Total bruto</div><div class="value" id="${mod.id}-bruto">0,00 €</div></div>
        <div class="result-box irpf-box"><div class="label">IRPF retenido</div><div class="value" id="${mod.id}-irpf-val">0,00 €</div></div>
        <div class="result-box neto"><div class="label">Total neto</div><div class="value" id="${mod.id}-neto">0,00 €</div></div>
      </div>
    </div>`;
}

function renderFinalCard() {
  const cfg = CONFIGS[currentConfig];
  const mods = cfg.modules;

  // Agrupar modulos por hospital para el breakdown
  const groups = {};
  mods.forEach(m => {
    const groupName = m.logo ? (m.logo === 'hsjd' ? 'HSJD' : 'VITHAS') : m.name.split(' ')[0].toUpperCase();
    if (!groups[groupName]) groups[groupName] = [];
    groups[groupName].push(m);
  });

  let breakdownHTML = '';
  for (const [groupName, groupMods] of Object.entries(groups)) {
    if (Object.keys(groups).length > 1 || groupMods.length > 1) {
      breakdownHTML += `<div class="breakdown-row breakdown-group"><span>${groupName}</span></div>`;
    }
    groupMods.forEach(m => {
      const subLabel = m.type === 'presencial' ? 'Presenciales' : 'Localizadas';
      const prefix = (Object.keys(groups).length > 1 || groupMods.length > 1) ? '  ' : '';
      const cls = (Object.keys(groups).length > 1 || groupMods.length > 1) ? 'breakdown-row breakdown-sub' : 'breakdown-row';
      breakdownHTML += `<div class="${cls}"><span>${prefix}${subLabel}</span><span id="bk-${m.id}-neto">0,00 €</span></div>`;
    });
  }
  breakdownHTML += `<div class="breakdown-row" style="margin-top:0.5rem"><span>IRPF total retenido</span><span id="bk-irpf-total" style="color:#fbbf24">0,00 €</span></div>`;

  // Barras de desglose
  let barsHTML = '';
  for (const [groupName, groupMods] of Object.entries(groups)) {
    barsHTML += `<div class="bar-section-label"${Object.keys(groups).indexOf(groupName) > 0 ? ' style="margin-top:0.6rem"' : ''}>${groupName}</div>`;
    groupMods.forEach(m => {
      const barLabel = m.type === 'presencial' ? 'Presencial' : 'Localiz.';
      barsHTML += `
        <div class="bar-row">
          <div class="bar-label bar-sub">${barLabel}</div>
          <div class="bar-track">
            <div class="bar-neto" id="bar-${m.id}-neto" style="width:0%"></div>
            <div class="bar-irpf" id="bar-${m.id}-irpf" style="width:0%"></div>
          </div>
          <div class="bar-amount" id="bar-${m.id}-amt">0,00 €</div>
        </div>`;
    });
  }

  document.getElementById('final-card').innerHTML = `
    <h2>Resumen Total del Mes</h2>
    <div class="final-amounts">
      <div class="final-item bruto">
        <div class="flabel">Total Bruto</div>
        <div class="famount" id="totalBruto">0,00 €</div>
      </div>
      <div class="separator"></div>
      <div class="final-item neto">
        <div class="flabel">Total Neto</div>
        <div class="famount" id="totalNeto">0,00 €</div>
      </div>
    </div>
    <div class="breakdown" style="max-width:400px;margin:0 auto">
      ${breakdownHTML}
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Desglose por modulo</div>
      ${barsHTML}
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot neto"></div>Neto</div>
        <div class="legend-item"><div class="legend-dot irpf"></div>IRPF</div>
      </div>
    </div>`;
}

function renderModules(configKey) {
  currentConfig = configKey;
  const cfg = CONFIGS[configKey];
  const container = document.getElementById('modules-container');

  // Guardar mes/anio actual si existe
  let savedYear = new Date().getFullYear();
  let savedMonth = new Date().getMonth();
  const anyState = Object.values(calState)[0];
  if (anyState) {
    savedYear = anyState.year;
    savedMonth = anyState.month;
  }

  // Reset calState
  calState = {};
  cfg.modules.forEach(m => {
    calState[m.id] = {
      year: savedYear,
      month: savedMonth,
      selected: {}
    };
  });

  // Generar HTML de modulos
  container.innerHTML = cfg.modules.map(m => getModuleHTML(m)).join('');

  // Generar final card
  renderFinalCard();
  const finalEl = document.getElementById('final-card');
  finalEl.classList.toggle('full-width', cfg.modules.length % 2 === 0);

  // Restaurar tarifas del usuario desde localStorage
  restoreUserRates(configKey);

  // Renderizar calendarios
  renderAllCals();

  // Anadir event listeners
  cfg.modules.forEach(m => {
    document.getElementById(`${m.id}-prev`).addEventListener('click', () => navCal(m.id, -1));
    document.getElementById(`${m.id}-next`).addEventListener('click', () => navCal(m.id, 1));
  });

  document.querySelectorAll('.cal-reset-link').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.cal;
      if (calState[id]) {
        calState[id].selected = {};
        syncInputs(id);
        renderCal(id);
        calcular();
      }
    });
  });

  // Input listeners
  container.querySelectorAll('input').forEach(el => el.addEventListener('input', () => {
    calcular();
    saveUserRates(configKey);
  }));

  // Actualizar pills activa
  document.querySelectorAll('.config-pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.config === configKey);
  });

  calcular();
}

// ─────────────────────────────────────────────
//  CALCULOS
// ─────────────────────────────────────────────
function animateValue(el, newText) {
  if (!el || el.textContent === newText) return;
  el.textContent = newText;
  el.classList.add('value-animate', 'bumping');
  setTimeout(() => el.classList.remove('bumping'), 300);
}

function calcular() {
  const cfg = CONFIGS[currentConfig];
  let totalBruto = 0, totalNeto = 0, totalIRPF = 0;
  const modResults = [];

  cfg.modules.forEach(mod => {
    const c17 = parseFloat(document.getElementById(`${mod.id}-count17`)?.value) || 0;
    const c24 = parseFloat(document.getElementById(`${mod.id}-count24`)?.value) || 0;
    const irpf = parseFloat(document.getElementById(`${mod.id}-irpf`)?.value) || 0;

    let base17 = 0, base24 = 0;

    if (mod.type === 'presencial') {
      const r17 = parseFloat(document.getElementById(`${mod.id}-rate17`)?.value) || 0;
      const r24 = parseFloat(document.getElementById(`${mod.id}-rate24`)?.value) || 0;
      base17 = c17 * r17 * 17;
      base24 = c24 * r24 * 24;
    } else if (mod.type === 'compuesta') {
      const m17 = parseFloat(document.getElementById(`${mod.id}-mult17`)?.value) || 0;
      const e17 = parseFloat(document.getElementById(`${mod.id}-eur17`)?.value) || 0;
      const m24 = parseFloat(document.getElementById(`${mod.id}-mult24`)?.value) || 0;
      const e24 = parseFloat(document.getElementById(`${mod.id}-eur24`)?.value) || 0;
      base17 = c17 * m17 * e17;
      base24 = c24 * m24 * e24;
    } else if (mod.type === 'plana') {
      const r17 = parseFloat(document.getElementById(`${mod.id}-rate17`)?.value) || 0;
      const r24 = parseFloat(document.getElementById(`${mod.id}-rate24`)?.value) || 0;
      base17 = c17 * r17;
      base24 = c24 * r24;
    }

    const bruto = base17 + base24;
    const neto = bruto * ((100 - irpf) / 100);
    const irpfAmt = bruto - neto;

    animateValue(document.getElementById(`${mod.id}-res17`), fmt(base17));
    animateValue(document.getElementById(`${mod.id}-res24`), fmt(base24));
    animateValue(document.getElementById(`${mod.id}-bruto`), fmt(bruto));
    animateValue(document.getElementById(`${mod.id}-neto`), fmt(neto));
    animateValue(document.getElementById(`${mod.id}-irpf-val`), fmt(irpfAmt));

    totalBruto += bruto;
    totalNeto += neto;
    totalIRPF += irpfAmt;

    modResults.push({ id: mod.id, bruto, neto, irpfAmt });
  });

  animateValue(document.getElementById('totalBruto'), fmt(totalBruto));
  animateValue(document.getElementById('totalNeto'), fmt(totalNeto));

  // Breakdown
  modResults.forEach(r => {
    animateValue(document.getElementById(`bk-${r.id}-neto`), fmt(r.neto));
  });
  animateValue(document.getElementById('bk-irpf-total'), fmt(totalIRPF));

  // Barras
  const maxBruto = Math.max(...modResults.map(r => r.bruto), 1);
  function setPct(id, pct) {
    const el = document.getElementById(id);
    if (el) el.style.width = Math.max(0, Math.min(100, pct)).toFixed(1) + '%';
  }
  modResults.forEach(r => {
    setPct(`bar-${r.id}-neto`, (r.neto / maxBruto) * 100);
    setPct(`bar-${r.id}-irpf`, (r.irpfAmt / maxBruto) * 100);
    const amtEl = document.getElementById(`bar-${r.id}-amt`);
    if (amtEl) amtEl.textContent = fmt(r.bruto);
  });
}

// ─────────────────────────────────────────────
//  PERSISTENCIA
// ─────────────────────────────────────────────
function saveUserRates(configKey) {
  const cfg = CONFIGS[configKey];
  const data = {};
  cfg.modules.forEach(mod => {
    const modRates = {};
    const inputs = document.querySelectorAll(`[data-module="${mod.id}"] .rates-box input, [data-module="${mod.id}"] .irpf-row input`);
    inputs.forEach(inp => { modRates[inp.id] = inp.value; });
    data[mod.id] = modRates;
  });
  localStorage.setItem(`guardias-rates-${configKey}`, JSON.stringify(data));
  localStorage.setItem(`guardias-rates-${configKey}-date`, new Date().toDateString());
}

function restoreUserRates(configKey) {
  const saved = localStorage.getItem(`guardias-rates-${configKey}`);
  const savedDate = localStorage.getItem(`guardias-rates-${configKey}-date`);
  if (saved && savedDate === new Date().toDateString()) {
    try {
      const data = JSON.parse(saved);
      for (const [modId, rates] of Object.entries(data)) {
        for (const [inputId, value] of Object.entries(rates)) {
          const el = document.getElementById(inputId);
          if (el) el.value = value;
        }
      }
    } catch(e) { /* ignore */ }
  }
}

function saveConfig(configKey) {
  localStorage.setItem('guardias-config', configKey);
  localStorage.setItem('guardias-config-date', new Date().toDateString());
}

function loadConfig() {
  const saved = localStorage.getItem('guardias-config');
  const savedDate = localStorage.getItem('guardias-config-date');
  if (saved && savedDate === new Date().toDateString() && CONFIGS[saved]) {
    return saved;
  }
  return 'hsjd_vithas';
}

// ─────────────────────────────────────────────
//  DARK MODE
// ─────────────────────────────────────────────
const skyCheck = document.getElementById('sky-check');

function applyTheme(dark) {
  var metaTheme = document.getElementById('meta-theme');
  if (dark) {
    document.documentElement.setAttribute('data-theme', 'dark');
        skyCheck.checked = true;
    
    
    if (metaTheme) metaTheme.setAttribute('content', '#0a1628');
  } else {
    document.documentElement.removeAttribute('data-theme');
        skyCheck.checked = false;
    
    
    if (metaTheme) metaTheme.setAttribute('content', '#1e293b');
  }
  // Cambiar logos dia/noche
  document.querySelectorAll('.mod-logo').forEach(img => {
    const key = img.dataset.logo;
    if (key && LOGOS[key]) {
      img.src = dark ? LOGOS[key].noche : LOGOS[key].dia;
    }
  });
}

function getAutoTheme() {
  const hour = new Date().getHours();
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  return (hour >= 21 || hour < 7 || prefersDark) ? 'dark' : 'light';
}

function initTheme() {
  const saved = localStorage.getItem('theme');
  const savedDate = localStorage.getItem('theme-date');
  const today = new Date().toDateString();
  if (saved && savedDate === today) {
    applyTheme(saved === 'dark');
  } else {
    localStorage.removeItem('theme');
    localStorage.removeItem('theme-date');
    applyTheme(getAutoTheme() === 'dark');
  }
}

skyCheck.addEventListener('change', function() {
      var isDark = skyCheck.checked;
      applyTheme(isDark);
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  localStorage.setItem('theme-date', new Date().toDateString());
});

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  const saved = localStorage.getItem('theme');
  const savedDate = localStorage.getItem('theme-date');
  const today = new Date().toDateString();
  if (!saved || savedDate !== today) {
    applyTheme(getAutoTheme() === 'dark');
  }
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
initTheme();

// Renderizar pills de configuracion
const pillsContainer = document.getElementById('config-pills');
Object.entries(CONFIGS).forEach(([key, cfg]) => {
  const btn = document.createElement('button');
  btn.className = 'config-pill';
  btn.dataset.config = key;
  btn.textContent = cfg.label;
  btn.addEventListener('click', () => {
    renderModules(key);
    saveConfig(key);
  });
  pillsContainer.appendChild(btn);
});

// Cargar configuracion guardada o por defecto
const initialConfig = loadConfig();
renderModules(initialConfig);
saveConfig(initialConfig);

// ─────────────────────────────────────────────
//  URL PARAMS (for integration with planning-cot)
// ─────────────────────────────────────────────
(function() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('tab')) return;
  const tab = params.get('tab');
  if (tab && CONFIGS[tab]) {
    renderModules(tab);
    saveConfig(tab);
  }
  const fills = [['gpf17','gpf-count17'],['gpf24','gpf-count24'],['hsjd17','hsjd-count17'],['hsjd24','hsjd-count24']];
  for (const [p, id] of fills) {
    const v = params.get(p);
    if (v) { const el = document.getElementById(id); if (el) { el.value = parseInt(v, 10) || 0; } }
  }
  calcular();
  if (window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
})();
</script>
